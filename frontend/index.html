<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Team Builder</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>Team Builder</h1>
  <p class="subtitle">Подбор и рекомендации для эффективной команды</p>

  <label>Роль</label>
  <select id="role">
    <option>Разработчик</option>
    <option>Менеджер</option>
    <option>Аналитик</option>
  </select>

  <label>DISC (тип личности)</label>
  <select id="disc">
    <option value="D">D — лидер</option>
    <option value="I">I — общительный</option>
    <option value="S">S — стабильный</option>
    <option value="C">C — аналитик</option>
  </select>

  <label>Мотивация</label>
  <select id="motivation">
    <option>Деньги</option>
    <option>Рост</option>
    <option>Стабильность</option>
  </select>

  <label>Поколение</label>
    <select id="generation">
    <option value="Z">Z (до ~25 лет)</option>
    <option value="Y">Y / миллениалы (25–40)</option>
    <option value="X">X (40+)</option>
  </select>

  <button onclick="generate()">Получить рекомендации</button>

  <div class="result" id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
